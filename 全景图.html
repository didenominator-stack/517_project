<script>
    document.addEventListener("DOMContentLoaded", () => {
        const iframeWrapper = document.getElementById('gallery-iframe-wrapper');
        const galleryFrame = document.getElementById('gallery-frame');
        const backButton = document.getElementById('back-to-timeline');
        const artClickTarget = document.querySelector('.clickable-art');

        // 1. 点击展开画卷页
        if (artClickTarget) {
            artClickTarget.addEventListener('click', () => {
                galleryFrame.src = '时间画卷.html'; // 确保 2.html 和当前文件放在同一个文件夹
                iframeWrapper.style.display = 'block';
            });
        }

        // 2. 点击返回时间轴
        if (backButton) {
            backButton.addEventListener('mouseenter', () => backButton.style.backgroundColor = 'rgba(255, 255, 255, 1)');
            backButton.addEventListener('mouseleave', () => backButton.style.backgroundColor = 'rgba(245, 243, 236, 0.8)');

            backButton.addEventListener('click', () => {
                iframeWrapper.style.display = 'none';
                galleryFrame.src = ''; // 清空以停止画卷页的动画
            });
        }
    });
</script>
